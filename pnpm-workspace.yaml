packages:
  - .
  - ./cdk
  - ./docs
allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - pnpm@11.9.0
  - esbuild@0.28.1

overrides:
  chokidar: '>=5'
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  semver: '>=7'

trustPolicy: no-downgrade
